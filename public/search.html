<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>Ximvid — Buscar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,#06101e 0%,#0a1628 40%,#0f2040 70%,#06101e 100%);color:#fff;min-height:100%;padding-bottom:90px;overflow-x:hidden;}
@keyframes metalSlide{0%{background-position:0% center}100%{background-position:300% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* HEADER */
.top-header{padding:max(52px,calc(44px + env(safe-area-inset-top))) 16px 14px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:12px;}

/* SEARCH BAR */
.search-wrap{position:relative;margin-bottom:14px;}
.search-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:13px 44px 13px 44px;color:#fff;font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.search-input:focus{border-color:rgba(74,144,217,.4);background:rgba(74,144,217,.04);}
.search-input::placeholder{color:rgba(255,255,255,.25);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:1rem;pointer-events:none;}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.35);font-size:.85rem;cursor:pointer;display:none;padding:4px;}

/* FILTER CHIPS */
.filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:16px;}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:7px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);font-size:.78rem;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;white-space:nowrap;}
.filter-chip.active{background:linear-gradient(115deg,#06101e,#0f2040,#1a3668,#2258a8,#1a3668,#0f2040,#06101e);background-size:300% 100%;animation:metalSlide 5s linear infinite;color:#fff;border-color:rgba(74,144,217,.3);}

/* TRENDING HASHTAGS */
.section-title{font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(168,208,240,.35);margin-bottom:10px;padding:0 16px;}
.hashtag-cloud{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px;margin-bottom:24px;}
.hashtag-pill{background:rgba(74,144,217,.1);border:1px solid rgba(74,144,217,.2);border-radius:100px;padding:7px 14px;font-size:.82rem;color:rgba(168,208,240,.8);cursor:pointer;transition:all .2s;}
.hashtag-pill:hover{background:rgba(74,144,217,.2);color:#fff;}

/* RESULTS */
.results{padding:0 16px;}
.results-count{font-size:.78rem;color:rgba(255,255,255,.3);margin-bottom:14px;}

/* USER CARD */
.user-card{display:flex;align-items:center;gap:12px;padding:14px;background:linear-gradient(145deg,rgba(15,32,64,.88),rgba(11,26,48,.84));border:1px solid rgba(255,255,255,.08);border-radius:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.user-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);}
.user-card:hover{border-color:rgba(74,144,217,.25);background:linear-gradient(145deg,rgba(20,45,88,.88),rgba(15,32,64,.84));}
.user-av{width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,255,255,.15);overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#0b1a30,#2258a8,#4a90d9);display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.user-av img{width:100%;height:100%;object-fit:cover;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:.95rem;font-weight:500;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-username{font-size:.78rem;color:rgba(255,255,255,.38);}
.user-category{font-size:.72rem;color:rgba(168,208,240,.55);margin-top:3px;}
.user-arrow{color:rgba(255,255,255,.2);font-size:.9rem;flex-shrink:0;}

/* VIDEO RESULTS */
.videos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.video-thumb{aspect-ratio:9/16;position:relative;overflow:hidden;background:rgba(255,255,255,.05);border-radius:8px;cursor:pointer;}
.video-thumb video{width:100%;height:100%;object-fit:cover;}
.video-thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,.15);}
.video-thumb-info{position:absolute;bottom:0;left:0;right:0;padding:6px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);}
.video-thumb-user{font-size:.65rem;color:rgba(255,255,255,.7);}
.video-thumb-views{font-size:.6rem;color:rgba(255,255,255,.45);}

/* EMPTY / LOADING */
.state-box{padding:60px 20px;text-align:center;}
.state-icon{font-size:2.5rem;margin-bottom:12px;}
.state-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;margin-bottom:6px;}
.state-sub{font-size:.85rem;color:rgba(255,255,255,.3);font-weight:300;line-height:1.6;}
.search-spinner{width:24px;height:24px;border:3px solid rgba(74,144,217,.2);border-top-color:#4a90d9;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:10px 0;padding-bottom:max(10px,env(safe-area-inset-bottom));background:rgba(0,0,0,.55);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;align-items:center;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 14px;}
.nav-ico{font-size:1.3rem;line-height:1;}
.nav-lbl{font-size:.6rem;color:rgba(255,255,255,.45);}
.nav-item.active .nav-lbl{color:rgba(255,255,255,.85);}
.nav-plus{width:48px;height:32px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#fff;background:linear-gradient(115deg,#06101e,#0f2040,#1a3668,#2258a8,#1a3668,#0f2040,#06101e);background-size:300% 100%;animation:metalSlide 5s linear infinite;box-shadow:0 2px 12px rgba(34,88,168,.45);}
</style>
</head>
<body>

<div class="top-header">
  <div class="page-title">Buscar</div>

  <!-- SEARCH BAR -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-input" id="search-input"
      placeholder="Buscar creadores, hashtags..."
      autocomplete="off" autocorrect="off" autocapitalize="none"
      oninput="onSearch(this.value)"
      onfocus="showClear(true)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>

  <!-- FILTERS -->
  <div class="filter-row">
    <div class="filter-chip active" onclick="setFilter('all',this)">Todo</div>
    <div class="filter-chip" onclick="setFilter('users',this)">Creadores</div>
    <div class="filter-chip" onclick="setFilter('videos',this)">Videos</div>
    <div class="filter-chip" onclick="setFilter('hashtags',this)">#Hashtags</div>
  </div>
</div>

<!-- DEFAULT: TRENDING -->
<div id="view-default">
  <div class="section-title">Hashtags populares</div>
  <div class="hashtag-cloud" id="trending-tags"></div>

  <div class="section-title">Creadores destacados</div>
  <div class="results" id="featured-users"></div>
</div>

<!-- LOADING -->
<div id="view-loading" style="display:none">
  <div class="state-box"><div class="search-spinner"></div></div>
</div>

<!-- RESULTS -->
<div id="view-results" style="display:none">
  <div class="results">
    <div class="results-count" id="results-count"></div>
    <div id="results-users"></div>
    <div class="videos-grid" id="results-videos"></div>
  </div>
</div>

<!-- EMPTY -->
<div id="view-empty" style="display:none">
  <div class="state-box">
    <div class="state-icon">🔍</div>
    <div class="state-title">Sin resultados</div>
    <div class="state-sub">Prueba con otro término o hashtag</div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="botnav">
  <div class="nav-item" onclick="window.location.href='/feed.html'"><div class="nav-ico">🏠</div><div class="nav-lbl">Inicio</div></div>
  <div class="nav-item active"><div class="nav-ico">🔍</div><div class="nav-lbl">Buscar</div></div>
  <button class="nav-plus" onclick="window.location.href='/upload.html'">+</button>
  <div class="nav-item" onclick="window.location.href='/notifications.html'"><div class="nav-ico">🔔</div><div class="nav-lbl">Avisos</div></div>
  <div class="nav-item" onclick="window.location.href='/profile.html'"><div class="nav-ico">👤</div><div class="nav-lbl">Perfil</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyD9rczM9lYndi4nt4Cv4EjE63QekuYxBpI",
  authDomain:"ximvid-c8627.firebaseapp.com",
  projectId:"ximvid-c8627",
  storageBucket:"ximvid-c8627.firebasestorage.app",
  messagingSenderId:"278931359476",
  appId:"1:278931359476:web:30fef5be9d11890bef80a1"
});

const auth = getAuth(app);
const db = getFirestore(app);
window._db = db;
window._fb = { collection, query, where, getDocs, orderBy, limit };

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = '/welcome.html'; return; }
  window._currentUser = user;
  await loadDefault();

  // Check URL params (hashtag desde feed)
  const params = new URLSearchParams(window.location.search);
  const tag = params.get('tag');
  if (tag) {
    document.getElementById('search-input').value = '#' + tag;
    showClear(true);
    doSearch('#' + tag);
  }
});

async function loadDefault() {
  try {
    // Cargar usuarios destacados
    const uq = window._fb.query(
      window._fb.collection(db, 'users'),
      window._fb.limit(6)
    );
    const uSnap = await window._fb.getDocs(uq);
    const users = uSnap.docs.map(d => d.data()).filter(u => u.username);
    renderFeaturedUsers(users);

    // Hashtags populares — cargar desde videos
    const vq = window._fb.query(
      window._fb.collection(db, 'videos'),
      window._fb.where('isActive','==',true),
      window._fb.limit(50)
    );
    const vSnap = await window._fb.getDocs(vq);
    const tagCount = {};
    vSnap.docs.forEach(d => {
      const tags = d.data().hashtags || [];
      tags.forEach(t => { tagCount[t] = (tagCount[t]||0)+1; });
    });
    const sorted = Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,12);
    renderTrendingTags(sorted.map(([t])=>t));
  } catch(e) {}
}

function renderTrendingTags(tags) {
  const el = document.getElementById('trending-tags');
  if (tags.length === 0) { el.innerHTML = '<div style="color:rgba(255,255,255,.2);font-size:.82rem">Aún no hay hashtags populares</div>'; return; }
  el.innerHTML = tags.map(t => `<div class="hashtag-pill" onclick="searchTag('${t}')">#${t}</div>`).join('');
}

function renderFeaturedUsers(users) {
  const el = document.getElementById('featured-users');
  el.innerHTML = users.map(u => userCardHTML(u)).join('');
}
</script>

<script>
let searchTimer = null;
let currentFilter = 'all';

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const val = document.getElementById('search-input').value.trim();
  if (val) doSearch(val);
}

function showClear(show) {
  document.getElementById('search-clear').style.display = show ? 'block' : 'none';
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  showClear(false);
  showView('default');
}

function onSearch(val) {
  showClear(val.length > 0);
  clearTimeout(searchTimer);
  if (!val.trim()) { showView('default'); return; }
  searchTimer = setTimeout(() => doSearch(val.trim()), 400);
}

function searchTag(tag) {
  document.getElementById('search-input').value = '#' + tag;
  showClear(true);
  doSearch('#' + tag);
}

async function doSearch(term) {
  showView('loading');
  const isHashtag = term.startsWith('#');
  const cleanTerm = isHashtag ? term.slice(1).toLowerCase() : term.toLowerCase();

  try {
    let users = [], videos = [];

    if (!isHashtag && (currentFilter === 'all' || currentFilter === 'users')) {
      // Buscar usuarios por username
      const uSnap = await window._fb.getDocs(window._fb.query(
        window._fb.collection(window._db, 'users'),
        window._fb.limit(20)
      ));
      users = uSnap.docs.map(d => d.data())
        .filter(u => u.username && (
          u.username.toLowerCase().includes(cleanTerm) ||
          (u.name||'').toLowerCase().includes(cleanTerm)
        ));
    }

    if (currentFilter === 'all' || currentFilter === 'videos' || currentFilter === 'hashtags' || isHashtag) {
      // Buscar videos por hashtag
      const vq = isHashtag
        ? window._fb.query(window._fb.collection(window._db,'videos'), window._fb.where('hashtags','array-contains',cleanTerm), window._fb.where('isActive','==',true), window._fb.limit(30))
        : window._fb.query(window._fb.collection(window._db,'videos'), window._fb.where('isActive','==',true), window._fb.limit(30));
      const vSnap = await window._fb.getDocs(vq);
      videos = vSnap.docs.map(d => ({id:d.id,...d.data()}));
      if (!isHashtag) {
        videos = videos.filter(v => (v.description||'').toLowerCase().includes(cleanTerm) || (v.hashtags||[]).some(h=>h.includes(cleanTerm)));
      }
    }

    if (users.length === 0 && videos.length === 0) { showView('empty'); return; }

    renderResults(users, videos, term);
    showView('results');

  } catch(e) { showView('empty'); }
}

function renderResults(users, videos, term) {
  const total = users.length + videos.length;
  document.getElementById('results-count').textContent = total + ' resultado' + (total!==1?'s':'') + ' para "' + term + '"';

  const usersEl = document.getElementById('results-users');
  usersEl.innerHTML = users.map(u => userCardHTML(u)).join('');

  const videosEl = document.getElementById('results-videos');
  videosEl.innerHTML = videos.map(v => `
    <div class="video-thumb" onclick="window.location.href='/feed.html?video=${v.id}'">
      <video src="${v.videoURL}" muted playsinline preload="metadata"></video>
      <div class="video-thumb-overlay"></div>
      <div class="video-thumb-info">
        <div class="video-thumb-user">@${v.username||''}</div>
        <div class="video-thumb-views">👁 ${v.views||0}</div>
      </div>
    </div>`).join('');
}

function userCardHTML(u) {
  const catMap = { selling_product:'🛍️ Productos', selling_service:'🎯 Servicios', sharing_content:'🎨 Contenido', discovering:'🔍 Descubridor' };
  const av = u.profilePhoto
    ? `<img src="${u.profilePhoto}" alt="${u.name}">`
    : (u.name ? u.name.charAt(0).toUpperCase() : '👤');
  return `<div class="user-card" onclick="window.location.href='/${u.username}'">
    <div class="user-av">${u.profilePhoto ? `<img src="${u.profilePhoto}" alt="${u.name}">` : (u.name?u.name.charAt(0).toUpperCase():'👤')}</div>
    <div class="user-info">
      <div class="user-name">${u.name||u.username}</div>
      <div class="user-username">@${u.username}</div>
      ${u.userType ? `<div class="user-category">${catMap[u.userType]||''}</div>` : ''}
    </div>
    <div class="user-arrow">›</div>
  </div>`;
}

function showView(view) {
  ['default','loading','results','empty'].forEach(v => {
    document.getElementById('view-'+v).style.display = v===view ? 'block' : 'none';
  });
}
</script>
</body>
</html>
